<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Love & Fire</title>
    
    <!-- Bibliothèques Pro -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="/src/css/style.css">
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <!-- LOADER DE PAGE (Caché par JS après chargement) -->
    <div id="page-loader" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-16 h-16 border-4 border-slate-100 border-t-brand-trust rounded-full animate-spin"></div>
        <p class="mt-4 font-display font-bold text-slate-400 uppercase tracking-widest text-xs animate-pulse">Chargement Sécurisé...</p>
    </div>

    <!-- NAVBAR ADMIN PRO -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-heart text-brand-love text-xl"></i>
                    <span class="font-display font-bold text-slate-900 text-lg">Admin Center</span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="admin-email" class="hidden sm:block text-xs text-slate-500 font-medium bg-slate-100 px-3 py-1 rounded-full"></span>
                    <button id="logout-btn" class="flex items-center gap-2 text-sm bg-red-50 text-brand-love hover:bg-brand-love hover:text-white px-4 py-2 rounded-xl font-bold transition-all">
                        <i class="fa-solid fa-right-from-bracket"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 sm:p-8">
        <!-- HEADER DE SECTION -->
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h2 class="text-3xl font-display font-extrabold text-slate-900">Inscriptions Reçues</h2>
                <p class="text-slate-500 text-sm mt-1">Gérez les demandes et contactez les parents.</p>
            </div>
            <div class="bg-white px-6 py-4 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-4">
                <div class="w-10 h-10 bg-blue-50 text-brand-trust rounded-full flex items-center justify-center text-xl">
                    <i class="fa-solid fa-user-graduate"></i>
                </div>
                <div>
                    <p class="text-xs text-slate-400 font-bold uppercase">Total</p>
                    <p id="total-count" class="text-xl font-black text-slate-900">--</p>
                </div>
            </div>
        </div>

        <!-- TABLEAU DES DONNÉES -->
        <div class="bg-white rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50/50 text-xs uppercase text-slate-400 font-bold tracking-widest border-b border-slate-100">
                        <tr>
                            <th class="p-6">Parent</th>
                            <th class="p-6">Enfant</th>
                            <th class="p-6">Programme</th>
                            <th class="p-6">Date</th>
                            <th class="p-4 text-center">Statut</th>
                            <th class="p-6 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="enrollment-list" class="divide-y divide-slate-100 text-slate-600">
                        <!-- SKELETONS PAR DÉFAUT -->
                        <tr class="animate-pulse">
                            <td class="p-6"><div class="h-4 bg-slate-100 rounded w-24 mb-2"></div><div class="h-3 bg-slate-50 rounded w-32"></div></td>
                            <td class="p-6"><div class="h-4 bg-slate-100 rounded w-20"></div></td>
                            <td class="p-6"><div class="h-4 bg-slate-100 rounded w-28"></div></td>
                            <td class="p-6"><div class="h-4 bg-slate-100 rounded w-16"></div></td>
                            <td class="p-4"><div class="h-6 bg-slate-100 rounded-full w-20 mx-auto"></div></td>
                            <td class="p-6"><div class="h-8 bg-slate-100 rounded-lg w-full ml-auto"></div></td>
                        </tr>
                        <!-- Répète le skeleton 3 fois -->
                        <tr class="animate-pulse">
                            <td class="p-6"><div class="h-4 bg-slate-100 rounded w-24 mb-2"></div><div class="h-3 bg-slate-50 rounded w-32"></div></td>
                            <td class="p-6"><div class="h-4 bg-slate-100 rounded w-20"></div></td>
                            <td class="p-6"><div class="h-4 bg-slate-100 rounded w-28"></div></td>
                            <td class="p-6"><div class="h-4 bg-slate-100 rounded w-16"></div></td>
                            <td class="p-4"><div class="h-6 bg-slate-100 rounded-full w-20 mx-auto"></div></td>
                            <td class="p-6"><div class="h-8 bg-slate-100 rounded-lg w-full ml-auto"></div></td>
                        </tr>

                        <tr class="animate-pulse">
                            <td class="p-6"><div class="h-4 bg-slate-100 rounded w-24 mb-2"></div><div class="h-3 bg-slate-50 rounded w-32"></div></td>
                            <td class="p-6"><div class="h-4 bg-slate-100 rounded w-20"></div></td>
                            <td class="p-6"><div class="h-4 bg-slate-100 rounded w-28"></div></td>
                            <td class="p-6"><div class="h-4 bg-slate-100 rounded w-16"></div></td>
                            <td class="p-4"><div class="h-6 bg-slate-100 rounded-full w-20 mx-auto"></div></td>
                            <td class="p-6"><div class="h-8 bg-slate-100 rounded-lg w-full ml-auto"></div></td>
                        </tr>

                        <tr class="animate-pulse">
                            <td class="p-6"><div class="h-4 bg-slate-100 rounded w-24 mb-2"></div><div class="h-3 bg-slate-50 rounded w-32"></div></td>
                            <td class="p-6"><div class="h-4 bg-slate-100 rounded w-20"></div></td>
                            <td class="p-6"><div class="h-4 bg-slate-100 rounded w-28"></div></td>
                            <td class="p-6"><div class="h-4 bg-slate-100 rounded w-16"></div></td>
                            <td class="p-4"><div class="h-6 bg-slate-100 rounded-full w-20 mx-auto"></div></td>
                            <td class="p-6"><div class="h-8 bg-slate-100 rounded-lg w-full ml-auto"></div></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module" src="/src/js/admin.js"></script>
</body>
</html>
